# Docs workflow — runs on every push to main.
#
# Builds the Astro Starlight documentation site and deploys it to
# GitHub Pages. TypeDoc generates API documentation from src/ at
# build time, so root dependencies must be installed alongside the
# docs dependencies.
#
# Deployed to: https://sidisinsane.github.io/vscode-theme-humanuals
#
# Prerequisites:
#   - GitHub Pages must be enabled in repository settings with
#     source set to "GitHub Actions"

name: Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Build docs
        run: npm run build
        working-directory: docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4